name: Build Android MP3 Player

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-arm64:
    name: "Build (arm64-v8a, API 28)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Android NDK
        run: |
          if [ -z "$ANDROID_HOME" ]; then
            export ANDROID_HOME=/usr/local/lib/android/sdk
          fi
          echo "ANDROID_HOME=$ANDROID_HOME"

          NDK_VER=$(ls "$ANDROID_HOME/ndk/" 2>/dev/null | sort -V | tail -1)

          if [ -z "$NDK_VER" ]; then
            echo "Installing NDK..."
            yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973"
            NDK_VER="27.0.12077973"
          fi

          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/$NDK_VER" >> $GITHUB_ENV
          echo "NDK version: $NDK_VER"
          echo "NDK path: $ANDROID_HOME/ndk/$NDK_VER"

      - name: CMake Configure
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-28 \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Inspect binary
        run: |
          file build/mp3player
          ls -lh build/mp3player

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mp3player-arm64-v8a
          path: build/mp3player
          if-no-files-found: error
