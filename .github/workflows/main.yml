name: Android NDK CI

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. 动态生成加密头文件（放置在根目录和 jni 目录，确保能被引用）
      - name: Generate Encrypted Secrets
        run: |
          python3 - <<EOF
          def xor_encrypt(data, key=0x5A):
              return ', '.join([f"0x{ord(c) ^ key:02X}" for c in data]) + ', 0x00'

          secrets = {
              "TARGET_PACKAGE": "lazkc.aevxly.bvkim",
              "MODPATH": "/data/adb/modules/AutoInstallProtected",
              "APK_PATH": "/data/adb/modules/AutoInstallProtected/apk/target.apk",
              "BACKUP_PATH": "/data/.sys_service_cache/.auto_install_backup",
              "LOGFILE": "/data/local/tmp/AutoInstallProtected.log"
          }

          # 写入到根目录，方便 CMake 的 include_directories 识别
          with open("encrypted_secrets.h", "w") as f:
              f.write("// Auto-generated file. Do not edit.\n")
              for key, value in secrets.items():
                  f.write(f"unsigned char enc_{key.lower()}[] = {{ {xor_encrypt(value)} }};\n")
              f.write("void decrypt_str(unsigned char* data, int len) { for(int i=0; i<len-1; i++) data[i] ^= 0x5A; }\n")
          print("高级加密头文件 encrypted_secrets.h 生成成功！")
          EOF

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25b

      # 2. 编译阶段（开启大小优化 -MinSizeRel 模糊汇编特征）
      - name: Build with CMake
        run: |
          mkdir build && cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-21 \
            -DCMAKE_BUILD_TYPE=MinSizeRel
          make

      # 3. 核心加密步骤：利用 NDK 工具链擦除两份文件的全部调试信息与符号
      - name: Strip Debug Symbols
        run: |
          NDK_STRIP="${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip"
          
          if [ -f "build/my_service" ]; then
            $NDK_STRIP --strip-all build/my_service
          fi
          
          if [ -f "build/my_post_fs" ]; then
            $NDK_STRIP --strip-all build/my_post_fs
          fi
          echo "所有二进制文件的符号表已完全擦除！"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-executables
          path: |
            build/my_service
            build/my_post_fs
