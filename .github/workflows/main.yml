name: Android NDK CI

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. 自动生成加密的字符串头文件（防 strings 命令静态分析）
      - name: Generate Encrypted Strings
        run: |
          # 这里用一段 Bash/Python 脚本，在编译前动态生成密文，避免源码中出现明文路径
          # 我们把 "/data/adb/modules/AutoInstallProtected" 和备份路径做异或(XOR)处理
          python3 - <<EOF
          def xor_encrypt(data, key=0x5A):
              return ', '.join([f"0x{ord(c) ^ key:02X}" for c in data]) + ', 0x00'

          modpath = "/data/adb/modules/AutoInstallProtected"
          bkpath = "/data/.sys_service_cache/.auto_install_backup"

          with open("encrypted_secrets.h", "w") as f:
              f.write("// Auto-generated file. Do not edit.\n")
              f.write(f"unsigned char enc_modpath[] = {{ {xor_encrypt(modpath)} }};\n")
              f.write(f"unsigned char enc_bkpath[] = {{ {xor_encrypt(bkpath)} }};\n")
              f.write("void decrypt_str(unsigned char* data, int len) { for(int i=0; i<len-1; i++) data[i] ^= 0x5A; }\n")
          print("encrypted_secrets.h 生成成功！")
          EOF

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25b

      # 2. 编译阶段：开启全优化，模糊编译逻辑
      - name: Build with CMake
        run: |
          mkdir build && cd build
          # -DCMAKE_BUILD_TYPE=MinSizeRel 会使用 -Os 优化，不仅体积小，还会让汇编指令更紧凑难读
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-21 \
            -DCMAKE_BUILD_TYPE=MinSizeRel
          make

      # 3. 核心加密步骤：利用 NDK 的 llvm-strip 擦除所有符号表与调试信息
      - name: Strip Debug Symbols
        run: |
          NDK_STRIP="${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip"
          
          if [ -f "build/my_post_fs" ]; then
            $NDK_STRIP --strip-all build/my_post_fs
          fi
          
          if [ -f "build/my_service" ]; then
            $NDK_STRIP --strip-all build/my_service
          fi
          echo "符号表擦除完成！"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-executables
          path: |
            build/my_post_fs
            build/my_service
